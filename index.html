<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Step Final</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
.container{padding:15px;}
.card{
  background:#222;
  padding:15px;
  margin:10px;
  border-radius:15px;
}
button{
  padding:12px;
  margin:5px;
  width:90%;
  font-size:16px;
  border:none;
  border-radius:10px;
}
.mic{background:red;color:white;}
.next{background:green;color:white;}
.speak{width:50px;font-size:20px;}
.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<h2>🎬 Dream Step Final</h2>

<div id="pass">
<input id="code" placeholder="パスコード">
<button onclick="login()">入る</button>
</div>

<div id="app" class="hidden">

<div class="card">
<div id="scene"></div>
<div id="scene_ja"></div>
<button class="speak" onclick="speak(sceneText)">📣</button>
</div>

<div class="card">
<div id="reply"></div>
<div id="reply_ja"></div>
<button class="speak" onclick="speak(replyText)">📣</button>
</div>

<button class="mic" onclick="rec()">🎤 話す</button>

<div id="result"></div>

<button class="next" onclick="load()">▶ 次へ</button>

</div>

</div>

<script>

const URL="https://ai-memory-worker.gudafutanu.workers.dev";

let sceneText="";
let replyText="";

async function login(){
 const code=document.getElementById("code").value;

 const res=await fetch(URL+"/check-passcode",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({code})
 });

 const data=await res.json();

 if(data.ok){
  document.getElementById("pass").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  load();
 }else{
  alert("パスコード違い");
 }
}

async function load(){
 const res=await fetch(URL+"/generate",{method:"POST"});
 const data=await res.json();

 sceneText=data.scene_en;
 replyText=data.reply_en;

 document.getElementById("scene").innerText=data.scene_en;
 document.getElementById("scene_ja").innerText=data.scene_ja;
 document.getElementById("reply").innerText=data.reply_en;
 document.getElementById("reply_ja").innerText=data.reply_ja;
 document.getElementById("result").innerText="";
}

function speak(text){
 const u=new SpeechSynthesisUtterance(text);
 u.lang="en-US";
 speechSynthesis.speak(u);
}

function rec(){
 const r=new webkitSpeechRecognition();
 r.lang="en-US";

 r.onresult=async(e)=>{
  const text=e.results[0][0].transcript;

  const res=await fetch(URL+"/score",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({text,target:replyText})
  });

  const data=await res.json();

  document.getElementById("result").innerHTML=
   "⭐ "+data.score+"点<br>"+
   "👍 "+data.good.join(", ")+"<br>"+
   "⚠ "+data.improve.join(", ")+"<br>"+
   "💡 "+data.example;
 };

 r.start();
}

</script>

</body>
</html>
